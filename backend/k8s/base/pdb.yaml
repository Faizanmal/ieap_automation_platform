apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ieap-api-pdb
  namespace: ieap
  labels:
    app.kubernetes.io/name: ieap
    app.kubernetes.io/component: api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ieap
      app.kubernetes.io/component: api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ieap-worker-pdb
  namespace: ieap
  labels:
    app.kubernetes.io/name: ieap
    app.kubernetes.io/component: worker
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ieap
      app.kubernetes.io/component: worker
