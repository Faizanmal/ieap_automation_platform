apiVersion: v1
kind: ServiceAccount
metadata:
  name: ieap-api
  namespace: ieap
  labels:
    app.kubernetes.io/name: ieap
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ieap-worker
  namespace: ieap
  labels:
    app.kubernetes.io/name: ieap
    app.kubernetes.io/component: worker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ieap-api-role
  namespace: ieap
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ieap-api-rolebinding
  namespace: ieap
subjects:
  - kind: ServiceAccount
    name: ieap-api
    namespace: ieap
roleRef:
  kind: Role
  name: ieap-api-role
  apiGroup: rbac.authorization.k8s.io
