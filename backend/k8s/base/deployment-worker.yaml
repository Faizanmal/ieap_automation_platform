apiVersion: apps/v1
kind: Deployment
metadata:
  name: ieap-worker
  namespace: ieap
  labels:
    app.kubernetes.io/name: ieap
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ieap
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ieap
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: ieap-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      containers:
        - name: worker
          image: ieap:latest
          imagePullPolicy: IfNotPresent
          
          command:
            - celery
            - -A
            - cache.celery_app:celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
          
          envFrom:
            - configMapRef:
                name: ieap-config
            - secretRef:
                name: ieap-secrets
          
          env:
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: ieap-secrets
                  key: REDIS_URL
          
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - cache.celery_app:celery_app
                - inspect
                - ping
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: models
              mountPath: /app/models
      
      volumes:
        - name: tmp
          emptyDir: {}
        - name: models
          persistentVolumeClaim:
            claimName: ieap-models-pvc
