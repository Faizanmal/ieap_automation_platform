apiVersion: v1
kind: ConfigMap
metadata:
  name: ieap-config
  namespace: ieap
  labels:
    app.kubernetes.io/name: ieap
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  API_PORT: "8000"
  WORKERS: "4"
  CORS_ORIGINS: '["https://app.example.com"]'
  ENABLE_DOCS: "true"
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
  OTLP_ENDPOINT: "http://jaeger-collector:4317"
