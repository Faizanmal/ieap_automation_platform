apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ieap

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - rbac.yaml
  - deployment-api.yaml
  - deployment-worker.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: ieap

images:
  - name: ieap
    newTag: latest
