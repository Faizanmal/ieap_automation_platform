# Alembic Configuration File

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# Timezone for date-based operations
# timezone =

# Revision ID generation function
# revision_environment = false

# True to generate sorted imports
# sort_revision_directives = true

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Set to 'true' to run migrations online
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# Version path separator for multiple locations
# version_path_separator = :

# Set to 'true' for more verbose output
# output_encoding = utf-8

sqlalchemy.url = sqlite:///ieap.db


[post_write_hooks]
# Hook configurations for post-write hooks

# Black formatting
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
