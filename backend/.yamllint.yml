---
extends: default

rules:
  line-length:
    max: 120
    level: warning
  indentation:
    spaces: 2
  comments:
    min-spaces-from-content: 1
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
  document-start:
    present: false
  empty-lines:
    max: 2
    max-start: 0
    max-end: 1
  new-line-at-end-of-file: enable

ignore: |
  .venv/
  venv/
  node_modules/
  .git/
